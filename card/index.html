<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b1530">
<title>西田 光弘 / Mits</title>
<style>
  :root{
    --navy:#0b1530;
    --navy-2:#16224a;
    --gold:#c9a44c;
    --gold-soft:#e8c98a;
    --ivory:#f7f3e8;
    --text:#1a1f2e;
    --sub:#5a6377;
    --line:rgba(201,164,76,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--navy);color:var(--ivory);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
    font-feature-settings:"palt";line-height:1.6;
    height:100%;overflow:hidden;}
  body{
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    background:linear-gradient(165deg,var(--navy) 0%,var(--navy-2) 100%);
    display:flex;flex-direction:column;
  }
  body::before{
    content:"";position:fixed;top:-60px;right:-60px;width:220px;height:220px;
    background:radial-gradient(circle,rgba(201,164,76,.22),transparent 65%);
    border-radius:50%;pointer-events:none;
  }
  body::after{
    content:"";position:fixed;bottom:-80px;left:-40px;width:200px;height:200px;
    background:radial-gradient(circle,rgba(232,201,138,.14),transparent 70%);
    border-radius:50%;pointer-events:none;
  }

  .card{
    flex:1;display:flex;flex-direction:column;
    padding:32px 26px 22px;
    position:relative;z-index:1;
    max-width:480px;margin:0 auto;width:100%;
  }

  .brand-mark{
    display:inline-block;font-size:10px;letter-spacing:.34em;
    color:var(--gold-soft);border:1px solid var(--line);
    padding:5px 12px;border-radius:99px;margin-bottom:18px;align-self:flex-start;
  }
  .name-ja{font-size:34px;font-weight:700;letter-spacing:.06em;margin:0 0 4px;}
  .name-en{font-size:12px;letter-spacing:.24em;color:var(--gold-soft);margin:0 0 18px;}

  .corp-block{
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:14px 0;margin:0 0 18px;
  }
  .corp{color:var(--gold-soft);font-size:15px;font-weight:600;letter-spacing:.12em;}
  .corp-sub{font-size:12px;color:#c8cee0;letter-spacing:.06em;margin-top:3px;}

  .tagline{font-size:15px;line-height:1.85;color:#e6e9f2;margin:0 0 18px;letter-spacing:.02em;}
  .tagline b{color:var(--gold-soft);font-weight:600;}

  .pillars{margin:0 0 22px;}
  .pillars-label{
    font-size:10px;letter-spacing:.3em;color:var(--gold);margin-bottom:8px;
    display:inline-block;
  }
  .pillar{
    display:flex;gap:10px;align-items:baseline;
    padding:7px 0;font-size:13.5px;line-height:1.55;color:#e6e9f2;
    border-bottom:1px dashed rgba(232,201,138,.18);
  }
  .pillar:last-child{border-bottom:0;}
  .pillar .n{
    color:var(--gold-soft);font-size:10px;font-weight:700;letter-spacing:.15em;
    flex:0 0 22px;
  }
  .pillar b{color:var(--ivory);font-weight:600;}
  .pillar a{
    color:inherit;text-decoration:none;display:block;
    padding:4px 6px;margin:-4px -6px;border-radius:6px;
    transition:background .15s;
  }
  .pillar a:active{background:rgba(201,164,76,.18);}
  .pillar a b{color:var(--gold-soft);border-bottom:1px solid rgba(232,201,138,.4);}

  .pdf-btn{
    margin-top:auto;
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:20px 16px;
    background:linear-gradient(135deg,var(--gold) 0%,var(--gold-soft) 100%);
    color:var(--navy);text-decoration:none;
    border-radius:14px;
    font-size:17px;font-weight:700;letter-spacing:.08em;
    box-shadow:0 4px 18px rgba(201,164,76,.35);
    transition:transform .15s,box-shadow .15s;
    min-height:62px;
  }
  .pdf-btn:active{transform:scale(.97);box-shadow:0 2px 8px rgba(201,164,76,.5);}
  .pdf-btn .icon{font-size:22px;line-height:1;}
  .pdf-btn .sub{
    display:block;font-size:10px;font-weight:500;letter-spacing:.15em;
    color:rgba(11,21,48,.7);margin-top:3px;
  }
  .pdf-btn .label-wrap{display:flex;flex-direction:column;align-items:flex-start;}

  .foot{
    text-align:center;font-size:10px;color:#8a92a5;letter-spacing:.1em;
    margin-top:14px;
  }
</style>
</head>
<body>

<div class="card">

  <h1 class="name-ja">西田 光弘</h1>
  <p class="name-en">MITSUHIRO  NISHIDA</p>

  <div class="corp-block">
    <div class="corp">西田光弘個人事務所</div>
    <div class="corp-sub">代表 / The Innovation 主宰</div>
  </div>

  <p class="tagline">
    1人型起業家のための<br>
    <b>AIエージェント経営</b>を設計する<br>
    経営コンサルタント
  </p>

  <div class="pillars">
    <span class="pillars-label">3 BUSINESSES</span>
    <div class="pillar"><span class="n">01</span><a href="https://change.7years.life/p/I0DhTHFyevVP" target="_blank" rel="noopener"><b>The Innovation</b>　経営×AIのコミュニティ</a></div>
    <div class="pillar"><span class="n">02</span><a href="https://change.7years.life/p/V3A9LG00dL2S" target="_blank" rel="noopener"><b>AI-MITS</b>　コンサル職人技のAI移植</a></div>
    <div class="pillar"><span class="n">03</span><span><b>AI複製構築支援</b>　業種専門家への伴走</span></div>
  </div>

  <a href="meishi.pdf" class="pdf-btn" download>
    <span class="icon">↓</span>
    <span class="label-wrap">
      <span>名刺PDFを受け取る</span>
      <span class="sub">TAP TO DOWNLOAD &amp; AIRDROP</span>
    </span>
  </a>

  <div class="foot">© 西田光弘個人事務所</div>

</div>

</body>
</html>
